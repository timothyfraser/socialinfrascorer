development:
  mode: auto

deploy:
  install_metadata: true

home:
  title: "socialinfrascorer: Social Infrastructure Scorecard for R"
  description: >
    R client for the Social Infrastructure Scorecard. Authenticate,
    look up neighborhoods, submit scoring requests, and retrieve results
    through Supabase.
