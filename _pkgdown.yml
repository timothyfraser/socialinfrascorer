navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/get-started.html
    articles:
      text: Articles
      menu:
        - text: Dashboard
          href: articles/dashboard.html
        - text: Client API Reference
          href: articles/client-api.html
        - text: Workflows
          href: articles/workflows.html
    github:
      icon: fa-github
      href: https://github.com/timothyfraser/scorecard/tree/main
      aria-label: GitHub

reference:
  - title: Client Setup
    desc: Create and configure the API client.
    contents:
      - client

  - title: Authentication
    desc: User sign-up, sign-in, password reset, and account deletion.
    contents:
      - sign_up
      - sign_in
      - send_password_reset
      - delete_account

  - title: Polygon Lookup
    desc: Search and retrieve neighborhood boundaries.
    contents:
      - search_locations
      - get_boundary_by_osm_id
      - get_boundary_by_location_id
      - get_boundary_by_area_id
      - get_boundary_by_place_name

  - title: Themes and Keywords
    desc: Browse available social-infrastructure themes and keywords.
    contents:
      - get_themes
      - get_theme_keywords

  - title: Scorecard and Sites
    desc: Retrieve scorecard results and social-infrastructure sites.
    contents:
      - get_scorecard
      - get_sites

  - title: Requests
    desc: Submit requests and track processing status.
    contents:
      - submit_request
      - get_request_status
      - get_requests

  - title: Account and Usage
    desc: Subscription tier, usage summary, and remaining quota.
    contents:
      - get_subscription
      - get_usage
      - get_remaining_queries

articles:
  - title: Getting Started
    navbar: ~
    contents:
      - get-started
  - title: Guides
    contents:
      - dashboard
      - client-api
      - workflows
